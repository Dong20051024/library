<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交预约 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/libseat.css">
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="ls-topnav">
    <a href="../index.html" class="ls-topnav-brand">📚 图书馆座位预约</a>
    <div class="ls-topnav-right">
      <div class="ls-account-switcher" onclick="toggleDropdown(event)">
        <span class="avatar">1</span>
        <span>学生1</span>
        <span style="font-size:10px;">▼</span>
        <div class="ls-account-dropdown" id="accountDropdown">
          <a href="?user=student1" class="active">👤 学生1</a>
          <a href="?user=student2">👤 学生2</a>
          <a href="?user=student3">👤 学生3</a>
          <a href="?user=student4">👤 学生4</a>
          <a href="?user=student5">👤 学生5</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Toast 通知（提交成功时显示） -->
  <div class="ls-toast success" id="successToast">✅ 预约提交成功！正在跳转…</div>
  <div class="ls-toast error" id="errorToast">❌ 该时段已被预约，请选择其他时段</div>

  <div class="ls-phone-frame">
    <div class="ls-page">
      <!-- 返回 -->
      <a href="seat-detail.html" style="display:inline-flex; align-items:center; gap:4px; font-size:14px; color:var(--ls-text-secondary); text-decoration:none; margin-bottom:12px;">
        ← 返回座位详情
      </a>

      <h1 class="ls-page-title">提交预约</h1>

      <!-- 座位摘要卡片 -->
      <div class="ls-card" style="display:flex; align-items:center; gap:16px; padding:16px;">
        <div style="width:48px; height:48px; border-radius:10px; background:var(--ls-success-bg); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--ls-success); flex-shrink:0;">
          A01
        </div>
        <div>
          <div style="font-size:16px; font-weight:600;">座位 A-01</div>
          <div style="font-size:13px; color:var(--ls-text-secondary);">3楼 A区（靠窗）· 空闲</div>
        </div>
      </div>

      <!-- 表单区域 -->
      <div style="margin-top:8px;">
        <div class="ls-card">
          <!-- 日期选择 -->
          <div style="margin-bottom:16px;">
            <label class="ls-label">选择日期</label>
            <input type="date" class="ls-input" value="2026-07-08" min="2026-07-07">
          </div>

          <!-- 起始时间 -->
          <div style="margin-bottom:16px;">
            <label class="ls-label">开始时间</label>
            <select class="ls-select">
              <option value="08:00">08:00</option>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="14:00" selected>14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
              <option value="17:00">17:00</option>
              <option value="18:00">18:00</option>
              <option value="19:00">19:00</option>
              <option value="20:00">20:00</option>
            </select>
          </div>

          <!-- 结束时间 -->
          <div style="margin-bottom:8px;">
            <label class="ls-label">结束时间</label>
            <select class="ls-select">
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="11:00">11:00</option>
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
              <option value="17:00" selected>17:00</option>
              <option value="18:00">18:00</option>
              <option value="19:00">19:00</option>
              <option value="20:00">20:00</option>
              <option value="21:00">21:00</option>
            </select>
          </div>

          <!-- 时段预览 -->
          <div style="font-size:13px; color:var(--ls-text-secondary); padding:8px 0; text-align:center;">
            预约时段：<strong style="color:var(--ls-primary);">2026年7月8日 14:00 — 17:00</strong>（共 3 小时）
          </div>
        </div>

        <!-- 提交按钮 -->
        <div style="margin-top:16px;">
          <button class="ls-btn ls-btn-primary ls-btn-block ls-btn-lg" onclick="showToast('successToast')">
            确认预约
          </button>
        </div>

        <!-- 注意事项 -->
        <div style="margin-top:16px; padding:12px; background:var(--ls-primary-light); border-radius:var(--ls-radius-lg); font-size:13px; color:var(--ls-text-secondary);">
          💡 提交后请到图书馆前台告知管理员进行签到确认。如无法按时到馆，请及时取消预约。
        </div>
      </div>

      <!-- 异常状态演示：时段冲突 -->
      <div style="margin-top:32px; padding-top:16px; border-top:1px dashed var(--ls-border);">
        <div class="ls-device-tag">原型多状态演示</div>
        <div class="ls-card" style="border:1px solid var(--ls-danger);">
          <div style="display:flex; align-items:center; gap:12px;">
            <div style="font-size:24px;">⚠️</div>
            <div>
              <div style="font-size:14px; font-weight:600; color:var(--ls-danger);">该时段已被预约</div>
              <div style="font-size:13px; color:var(--ls-text-secondary);">座位 A-01 在 2026年7月8日 14:00-17:00 已被其他同学预约，请选择其他时段或座位。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/libseat.js"></script>
  <script>
    function showToast(id) {
      var toast = document.getElementById(id);
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
        if (id === 'successToast') {
          window.location.href = 'my-reservations.html';
        }
      }, 2000);
    }
  </script>
</body>
</html>
