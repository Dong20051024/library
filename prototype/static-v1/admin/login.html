<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/libseat.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ls-bg);
      padding: 20px;
    }
    .login-card {
      background: var(--ls-white);
      border-radius: var(--ls-radius-xl);
      box-shadow: var(--ls-shadow-card);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:36px; margin-bottom:8px;">📚</div>
        <div style="font-size:20px; font-weight:600; color:var(--ls-primary);">图书馆座位预约</div>
        <div style="font-size:14px; color:var(--ls-text-secondary); margin-top:4px;">管理员登录</div>
      </div>

      <!-- 错误状态演示 -->
      <div class="ls-demo-toggle" style="margin-bottom:16px;">
        <span style="font-size:12px; color:var(--ls-text-secondary); padding:4px 8px;">演示：</span>
        <button class="toggle-btn active" onclick="toggleLoginDemo('normal')">正常状态</button>
        <button class="toggle-btn" onclick="toggleLoginDemo('error')">错误状态</button>
      </div>

      <!-- 正常表单 -->
      <div id="login-form-normal">
        <form onsubmit="return false;">
          <div style="margin-bottom:16px;">
            <label class="ls-label">用户名</label>
            <input type="text" class="ls-input" placeholder="请输入管理员账号" value="admin">
          </div>
          <div style="margin-bottom:20px;">
            <label class="ls-label">密码</label>
            <input type="password" class="ls-input" placeholder="请输入密码" value="123456">
          </div>
          <button class="ls-btn ls-btn-primary ls-btn-block ls-btn-lg" onclick="handleLogin()">
            登 录
          </button>
        </form>
        <div style="text-align:center; margin-top:16px;">
          <a href="../index.html" style="font-size:13px; color:var(--ls-text-secondary);">返回用户端</a>
        </div>
      </div>

      <!-- 错误状态 -->
      <div id="login-form-error" style="display:none;">
        <div style="margin-bottom:16px;">
          <label class="ls-label">用户名</label>
          <input type="text" class="ls-input error" placeholder="请输入管理员账号" value="admin">
          <div class="ls-error-text">密码错误</div>
        </div>
        <div style="margin-bottom:8px;">
          <label class="ls-label">密码</label>
          <input type="password" class="ls-input error" placeholder="请输入密码" value="wrong">
        </div>
        <div style="background:var(--ls-danger-bg); border-radius:var(--ls-radius-lg); padding:12px; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
          <span style="color:var(--ls-danger);">⚠️</span>
          <span style="font-size:14px; color:var(--ls-danger);">账号或密码错误，请重新输入</span>
        </div>
        <button class="ls-btn ls-btn-primary ls-btn-block ls-btn-lg" onclick="handleLogin()">
          登 录
        </button>
        <div style="text-align:center; margin-top:16px;">
          <a href="../index.html" style="font-size:13px; color:var(--ls-text-secondary);">返回用户端</a>
        </div>
      </div>

      <!-- 提示 -->
      <div style="margin-top:16px; padding:12px; background:var(--ls-primary-light); border-radius:var(--ls-radius-lg); font-size:13px; color:var(--ls-text-secondary);">
        💡 演示账号：admin / 123456
      </div>
    </div>
  </div>

  <script src="../assets/js/libseat.js"></script>
  <script>
    function toggleLoginDemo(state) {
      var normal = document.getElementById('login-form-normal');
      var error = document.getElementById('login-form-error');
      if (state === 'normal') {
        normal.style.display = 'block';
        error.style.display = 'none';
      } else {
        normal.style.display = 'none';
        error.style.display = 'block';
      }
      document.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
      event.target.classList.add('active');
    }

    function handleLogin() {
      window.location.href = 'reservations.html';
    }
  </script>
</body>
</html>
